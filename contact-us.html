<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapJo - اتصل بنا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff8c32; 
            --bg: #f6f3ef; 
            --dark: #2d3436;
            --white: #ffffff;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        /* الجزء الأيمن: معلومات التواصل */
        .contact-info {
            background:black;
            color: white;
            padding: 40px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contact-info h2 {
            color: var(--primary);
            margin-bottom: 20px;
        }

        .info-item {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .info-item .icon {
            font-size: 24px;
            background: rgba(255, 140, 50, 0.2);
            padding: 10px;
            border-radius: 12px;
            color: var(--primary);
        }

        /* الجزء الأيسر: نموذج التواصل */
        .contact-form {
            background: var(--white);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: black;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #dfe6e9;
            background: #fff;
            font-family: inherit;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 140, 50, 0.1);
        }

        .send-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .send-btn:hover {
            background: #e67e22;
            transform: translateY(-3px);
        }

        /* استجابة للهواتف */
        @media (max-width: 425px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- معلومات التواصل -->
        <div class="contact-info">
            <h2>لنبدأ الإبداع! 📸</h2>
            <p>لديك استفسار أو ترغب في الانضمام لشركائنا؟ نحن هنا للمساعدة.</p>
            
            <div class="info-item">
                <span class="icon">📍</span>
                <div>
                    <strong>الموقع:</strong>
                    <p>إربد، الأردن</p>
                </div>
            </div>

            <div class="info-item">
                <span class="icon">📧</span>
                <div>
                    <strong>البريد الإلكتروني:</strong>
                    <p>support@snapjo.com</p>
                </div>
            </div>

            <div class="info-item">
                <span class="icon">📞</span>
                <div>
                    <strong>الهاتف:</strong>
                    <p>+962 7XXXXXXXX</p>
                </div>
            </div>
        </div>

        <!-- فورم التواصل -->
        <div class="contact-form">
            <form id="contactForm">
                <div class="input-group">
                    <label>الاسم</label>
                    <input type="text" id="name" placeholder="اسمك الكامل" required>
                </div>

                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>

                <div class="input-group">
                    <label>الموضوع</label>
                    <input type="text" id="subject" placeholder="كيف يمكننا مساعدتك؟">
                </div>

                <div class="input-group">
                    <label>الرسالة</label>
                    <textarea id="message" rows="4" placeholder="اكتب رسالتك هنا..." required></textarea>
                </div>

                <button type="submit" class="send-btn">إرسال الرسالة</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // محاكاة إرسال الرسالة
            const name = document.getElementById('name').value;
            alert("شكراً لك يا " + name + "! تم استلام رسالتك وسنقوم بالرد عليك قريباً.");
            
            // إعادة ضبط النموذج
            this.reset();
        });
    </script>

</body>
</html>
