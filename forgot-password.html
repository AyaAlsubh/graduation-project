<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapio - استعادة كلمة المرور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* التنسيقات العامة للصفحة */
        .auth-page {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1542038784456-1ea8e935640e?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* الهيدر واللوجو */
        .auth-header {
            padding: 20px 50px;
        }
        .auth-header .logo { 
            font-size: 28px; 
            font-weight: bold;
            color: white; 
            text-decoration: none;
        }
        .auth-header .logo span { color: #ff8c32; }

        /* حاوية النموذج (الكرت الشفاف) */
        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.15); /* تأثير زجاجي */
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .lock-icon {
            font-size: 50px;
            margin-bottom: 10px;
            color: #ff8c32;
        }

        .auth-card h3 {
            margin: 10px 0;
            font-size: 22px;
        }

        .auth-instruction {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #f0f0f0;
        }

        /* تنسيق حقول الإدخال */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group .icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            font-family: 'Cairo';
            outline: none;
            box-sizing: border-box;
            font-size: 15px;
        }

        /* زر الإرسال */
        .btn-auth-submit {
            width: 100%;
            background: #ff8c32;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-auth-submit:hover {
            background: #e67e22;
        }

        /* روابط العودة */
        .back-to-login {
            display: block;
            margin-top: 25px;
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
        }

        .back-to-login:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="auth-page">

    <header class="auth-header">
        <a href="index.html" class="logo">Snap<span>io</span> 📷</a>
    </header>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="lock-icon">🔒</div>
            <h3>استعادة كلمة المرور</h3>
            <p class="auth-instruction">أدخل بريدك الإلكتروني المرتبط بحسابك، وسنرسل لك رابطاً لإعادة تعيين كلمة المرور</p>
            
            <form action="#">
                <div class="input-group">
                    <span class="icon">📧</span>
                    <input type="email" placeholder="البريد الإلكتروني" required>
                </div>

                <button type="submit" class="btn-auth-submit">إرسال الرابط</button>
            </form>

            <a href="login.html" class="back-to-login">العودة لصفحة تسجيل الدخول</a>
        </div>
    </div>

</body>
</html>
