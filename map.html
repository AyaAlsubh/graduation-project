<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Snapio - خريطة المصورين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; margin: 0; background-color: #f6f3ef; }
        header { background: #eee6de; padding: 15px; text-align: center; }
        .map-placeholder {
            width: 90%; max-width: 900px; height: 500px; margin: 20px auto;
            background: #e0dcd4 url('https://api.mapbox.com/styles/v1/mapbox/light-v10/static/35.85,32.55,12,0/900x500?access_token=YOUR_TOKEN') center/cover;
            border-radius: 20px; position: relative; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        /* دبابيس المواقع (Markers) */
        .marker { position: absolute; cursor: pointer; transition: 0.3s; }
        .marker:hover { transform: scale(1.2); }
        .marker::after { content: '📍'; font-size: 30px; }
        .marker-label {
            position: absolute; top: -35px; right: -20px; background: white;
            padding: 5px 10px; border-radius: 10px; font-size: 12px; font-weight: bold;
            white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<header>
    <h3>📍 مصورين بالقرب منك (إربد)</h3>
</header>

<div class="map-placeholder">
    <div class="marker" style="top: 40%; right: 45%;" onclick="location.href='photographer-profile.html?id=ahmad'">
        <div class="marker-label">أحمد علي - شارع الجامعة</div>
    </div>

    <div class="marker" style="top: 60%; right: 30%;" onclick="location.href='photographer-profile.html?id=sara'">
        <div class="marker-label">سارة محمد - شارع الحصن</div>
    </div>

    <div class="marker" style="top: 75%; right: 55%;" onclick="location.href='photographer-profile.html?id=khaled'">
        <div class="marker-label">خالد حسن - إيدون</div>
    </div>
</div>

<p style="text-align: center; color: #888;">* اضغط على الموقع لعرض بروفايل المصور</p>

</body>
</html>
