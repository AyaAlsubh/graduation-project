<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Snapio - الرسائل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f6f3ef; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #eee6de; padding: 15px 30px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .back-btn { text-decoration: none; color: #333; font-weight: bold; }
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 70%; padding: 12px 18px; border-radius: 20px; font-size: 15px; }
        .msg.received { background: white; align-self: flex-start; border-bottom-right-radius: 2px; }
        .msg.sent { background: #ff8c32; color: white; align-self: flex-end; border-bottom-left-radius: 2px; }
        .input-area { background: white; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; border: 1px solid #ddd; padding: 12px; border-radius: 25px; outline: none; font-family: 'Cairo'; }
        button { background: #ff8c32; color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <a href="search.html" class="back-btn">⬅</a>
    <h3 style="margin:0;">الدردشة مع المصور</h3>
</header>

<div class="chat-container" id="chat">
    <div class="msg received">مرحباً! كيف يمكنني مساعدتك في توثيق مناسبتك؟</div>
    <div class="msg sent">أهلاً، أريد الاستفسار عن توفرك يوم الجمعة القادم.</div>
</div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="اكتب رسالتك هنا...">
    <button onclick="sendMessage()">إرسال</button>
</div>

<script>
    function sendMessage() {
        const input = document.getElementById('msgInput');
        if (input.value.trim() === "") return;
        
        const chat = document.getElementById('chat');
        const newMsg = document.createElement('div');
        newMsg.className = 'msg sent';
        newMsg.innerText = input.value;
        
        chat.appendChild(newMsg);
        input.value = "";
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
