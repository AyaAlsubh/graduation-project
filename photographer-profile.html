<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SnapJo - دخول المصورين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff8c32; --dark: #2d3436; }
        body { font-family: 'Cairo', sans-serif; background: #fdfaf7; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-login { width: 100%; background: var(--dark); color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>دخول المصورين</h2>
        <input type="email" id="proEmail" placeholder="البريد الإلكتروني للمصور">
        <input type="password" id="proPass" placeholder="كلمة المرور">
        <button type="button" class="btn-login" onclick="loginPhotographer()">دخول للملف الشخصي</button>
        <p id="error" style="color:red; display:none; font-size:12px; margin-top:10px;">خطأ في التوجه للداشبورد!</p>
    </div>

    <script>
        function loginPhotographer() {
            const email = document.getElementById('proEmail').value;
            if(email === "") { alert("يرجى إدخال الإيميل"); return; }

            // حفظ هوية المصور لمنع التداخل مع الكستمر
            localStorage.setItem('userRole', 'photographer');
            localStorage.setItem('currentUser', email);

            // التوجه للداشبورد
            window.location.href = "photographer-dashboard.html";
            
            setTimeout(() => {
                if(!window.location.href.includes("photographer-dashboard.html")) {
                    document.getElementById('error').style.display = 'block';
                }
            }, 500);
        }
    </script>
</body>
</html>
