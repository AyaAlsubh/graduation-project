<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapJo - انضم كشريك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff8c32; --secondary: #2d3436; --glass: rgba(255, 255, 255, 0.9); }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #f6f3ef 0%, #e0dcd3 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card { background: var(--glass); backdrop-filter: blur(10px); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border: 1px solid white; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
        h2 { color: var(--secondary); text-align: center; margin-bottom: 30px; font-weight: 700; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #636e72; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #dfe6e9; background: white; font-family: inherit; transition: 0.3s; box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255, 140, 50, 0.1); }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #e67e22; transform: scale(1.02); }
        .link { text-align: center; margin-top: 20px; font-size: 14px; }
        .link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h2>أنشئ حسابك في SnapJo</h2>
        <form id="regForm">
            <div class="input-group">
                <label>الاسم الكامل</label>
                <input type="text" id="regName" placeholder="مثال: سارة أحمد" required>
            </div>
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="regEmail" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="regPass" placeholder="••••••••" required>
            </div>
            <button type="submit">ابدأ رحلتك الآن</button>
        </form>
        <div class="link">لديك حساب بالفعل؟ <a href="photographer-login.html">سجل دخولك</a></div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const userData = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                pass: document.getElementById('regPass').value
            };
            localStorage.setItem('registeredPhotographer', JSON.stringify(userData));
            window.location.href = "photographer-login.html";
        });
    </script>
</body>
</html>
